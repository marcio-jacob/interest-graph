user_social:
  description: >
    Raw social counts from user_features.csv, with follow_user_num and fans_user_num
    OVERRIDDEN to TikTok-calibrated lognormal fits. KuaiRec (Kuaishou) has a closed
    social graph (median 2 followers) which is not representative of TikTok's open,
    viral follower dynamics. The override targets observed TikTok distributions:
    median user ~665 followers, power-law tail reaching millions for top creators.
  follow_user_num:
    description: >
      How many accounts this user follows. TikTok users typically follow 100-500 accounts;
      power users follow 1000+. Lognormal mu=5.2 sigma=1.5 → median ~181, p90 ~1243.
    stats:
      mean: 558.0
      std: 1200.0
      min: 0.0
      max: 10000.0
      p5: 15.0
      p10: 27.0
      p25: 66.0
      p50: 181.0
      p75: 499.0
      p90: 1243.0
      p95: 2130.0
      p99: 5940.0
    lognormal_fit:
      mu: 5.2
      sigma: 1.5
  fans_user_num:
    description: >
      How many followers this user has. TikTok-calibrated: most users have hundreds of
      followers, creators have tens of thousands, viral creators reach millions.
      Lognormal mu=6.5 sigma=2.2 → median ~665, p90 ~11k, p99 ~111k.
      Generators should apply a creator multiplier (x5-x20) on top of this base draw
      to ensure creators have significantly more followers than regular users.
    stats:
      mean: 7490.0
      std: 65000.0
      min: 0.0
      max: 10000000.0
      p5: 18.0
      p10: 40.0
      p25: 151.0
      p50: 665.0
      p75: 2941.0
      p90: 11132.0
      p95: 24796.0
      p99: 111485.0
    lognormal_fit:
      mu: 6.5
      sigma: 2.2
  friend_user_num:
    description: Mutual follows (friends).
    stats:
      mean: 4.494844
      std: 44.894733
      min: 0.0
      max: 1425.0
      p5: 0.0
      p10: 0.0
      p25: 0.0
      p50: 0.0
      p75: 1.0
      p90: 5.0
      p95: 11.0
      p99: 49.0
