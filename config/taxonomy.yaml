    - {song_id: S005, weight: 4}
    - {song_id: S006, weight: 3}
    - {song_id: S007, weight: 3}
    - {song_id: S015, weight: 3}
    - {song_id: S016, weight: 3}
    - {song_id: S017, weight: 4}
    - {song_id: S019, weight: 3}
    - {song_id: S020, weight: 3}
