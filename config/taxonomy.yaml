# -----------------------------------------------------------------------------
# Username patterns — used by generators/users.py
# Tokens: {first} {last} {nn} {noun} {topic_word} {adjective} {country_adj}
# -----------------------------------------------------------------------------
username_patterns:
  - "{first}{last}{nn}"
  - "{first}.{topic_word}"
  - "the{noun}{verb}er"
  - "{topic_word}with{first}"
  - "{adjective}_{noun}"
  - "{first}_{country_adj}"
  - "{noun}vibes{nn}"
  - "its{first}official"
  - "xoxo.{topic_word}"
  - "{first}{last}_{nn}"

# Faker locale per country ISO code
faker_locales:
  US: en_US
  GB: en_GB
  BR: pt_BR
  JP: ja_JP
  KR: ko_KR
  IN: hi_IN
  DE: de_DE
  MX: es_MX
  ID: id_ID
  VN: vi_VN
  PH: en_PH
  NG: en_NG

# Adjectives used in username pattern {adjective}
username_adjectives:
  - cool
  - epic
  - real
  - daily
  - wild
  - tiny
  - golden
  - lazy
  - bold
  - fresh
  - dark
  - sunny
  - mystic
  - urban
  - cozy

# Country suffix used in username pattern {country_adj}
